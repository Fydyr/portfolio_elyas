services:

  database:
    image: mysql:8.0
    container_name: ${NAME}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USERNAME}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    networks:
      - lan
    volumes:
      - db-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: ${NAME}_pma
    restart: unless-stopped
    environment:
      PMA_HOST: database
      PMA_ABSOLUTE_URI: https://${NAME}.aeroliths.fr/phpmyadmin/
      UPLOAD_LIMIT: 128M
    labels:
      - traefik.enable=true
      - traefik.http.routers.pma_${NAME}.entrypoints=websecure
      - traefik.http.routers.pma_${NAME}.rule=Host(`${NAME}.aeroliths.fr`) && PathPrefix(`/phpmyadmin/`)
      - traefik.http.middlewares.pmapathstrip_${NAME}.stripprefix.prefixes=/phpmyadmin
      - traefik.http.routers.pma_${NAME}.middlewares=pmapathstrip_${NAME}@docker
      - traefik.http.routers.pma_${NAME}.tls=true
      - traefik.http.routers.pma_${NAME}.tls.certresolver=myresolver
    networks:
      - lan
      - web

  app:
    container_name: ${NAME}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - database
    restart: unless-stopped
    environment:
      MYSQL_HOST: database
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USERNAME: "${MYSQL_USERNAME}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      DB_REGENERATE: "${DB_REGENERATE:-false}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
    volumes:
      - ./assets/img/projects:/var/www/html/assets/img/projects
      - ./assets/docs:/var/www/html/assets/docs
    labels:
      - traefik.enable=true
      - traefik.http.routers.${NAME}.entrypoints=websecure
      - traefik.http.services.${NAME}.loadbalancer.server.port=80
      - traefik.http.routers.${NAME}.rule=Host(`${NAME}.aeroliths.fr`)
      - traefik.http.routers.${NAME}.tls=true
      - traefik.http.routers.${NAME}.tls.certresolver=myresolver
    networks:
      - lan
      - web

networks:
  web:
    external: true
  lan:
    driver: bridge
    name: lan_${NAME}

volumes:
  db-data:
